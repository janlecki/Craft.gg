<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CraftGG</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: white;
      text-align: center;
    }

    header {
      padding: 40px 20px;
    }

    h1 {
      font-size: 4rem;
      margin: 0;
      color: #22c55e;
      text-shadow: 0 0 15px #22c55e;
    }

    p {
      opacity: 0.7;
    }

    .buttons {
      margin-top: 40px;
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 15px 30px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.2s;
      display: inline-block;
    }

    .btn-play {
      background: #22c55e;
      color: black;
    }

    .btn-play:hover {
      background: #16a34a;
      transform: scale(1.05);
    }

    .btn-shop {
      background: #3b82f6;
      color: white;
    }

    .btn-shop:hover {
      background: #2563eb;
      transform: scale(1.05);
    }

    .btn-discord {
      background: #8b5cf6;
      color: white;
    }

    .btn-discord:hover {
      background: #7c3aed;
      transform: scale(1.05);
    }

    .section {
      margin-top: 80px;
      padding: 40px 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 20px;
      margin: 10px;
      display: inline-block;
      width: 250px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    footer {
      margin-top: 60px;
      padding: 20px;
      opacity: 0.5;
    }
  </style>
</head>
<body>

  <header>
    <h1>CraftGG</h1>
    <p>Najlepszy serwer Minecraft Anarchia</p>

    <div class="buttons">
      <a href="#" class="btn btn-play">▶ Dołącz do serwera</a>
      <a href="#" class="btn btn-shop">🛒 Sklep</a>
      <a href="#" class="btn btn-discord">💬 Discord</a>
    </div>
  </header>

  <div class="section">
    <h2>🔥 Tryb gry</h2>
    <div class="card">
      <h3>Anarchia</h3>
      <p>Brak zasad, brak limitów — rób co chcesz</p>
    </div>

    <div class="card">
      <h3>Gracze</h3>
      <p>Aktywna społeczność 24/7</p>
    </div>

    <div class="card">
      <h3>Wydajność</h3>
      <p>Brak lagów, stabilny serwer</p>
    </div>
  </div>

  <footer>
    © 2026 CraftGG - Minecraft Server
  </footer>

</body>
</html>
