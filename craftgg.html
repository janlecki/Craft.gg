<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mój Serwer Minecraft</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(120deg, #1e1e1e, #2c3e50);
      color: white;
      text-align: center;
    }

    header {
      padding: 60px 20px;
      background: url('https://i.imgur.com/3ZQ3Z9m.png') center/cover;
    }

    header h1 {
      font-size: 48px;
      margin: 0;
      text-shadow: 2px 2px 5px black;
    }

    header p {
      font-size: 20px;
      margin-top: 10px;
    }

    .container {
      padding: 40px 20px;
    }

    .box {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      margin: 20px auto;
      border-radius: 15px;
      max-width: 600px;
    }

    .btn {
      display: inline-block;
      padding: 15px 25px;
      margin: 10px;
      border-radius: 10px;
      text-decoration: none;
      color: white;
      font-weight: bold;
      transition: 0.3s;
    }

    .discord {
      background: #5865F2;
    }

    .discord:hover {
      background: #404EED;
    }

    .play {
      background: #2ecc71;
    }

    .play:hover {
      background: #27ae60;
    }
  </style>
</head>

<body>

<header>
  <h1>Mój Serwer Minecraft</h1>
  <p>Najlepszy serwer survival / skyblock / creative!</p>
</header>

<div class="container">

  <div class="box">
    <h2>IP Serwera</h2>
    <p><strong>play.twojserwer.pl</strong></p>
  </div>

  <div class="box">
    <h2>Dołącz do nas</h2>
    <p>Kliknij poniżej i dołącz do społeczności!</p>

    <a class="btn discord" href="https://discord.gg/TWOJLINK" target="_blank">
      Discord
    </a>

    <a class="btn play" href="#">
      Graj teraz
    </a>
  </div>

</div>

</body>
</html>
